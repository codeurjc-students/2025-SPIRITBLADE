apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: prod
  labels:
    app: backend
    environment: prod
spec:
  replicas: 1 # Gestionado por HPA (min: 1, max: 3)
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
      - name: dockerhub-secret
      containers:
      - name: app
        # Multi-arch backend-only image supporting linux/amd64 and linux/arm64
        image: docker.io/jae9104/spiritblade-backend:latest
        ports:
        - containerPort: 443
        resources:
          requests:
            memory: "300Mi"
            cpu: "100m"
          limits:
            memory: "600Mi"
            cpu: "600m"
        env:
        # Oracle Autonomous Database - Always Free (20 GB, managed, scalable)
        # Perfil TP (Transaction Processing), TLS sin wallet (puerto 1521, SERVER auth)
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:oracle:thin:@(description=(retry_count=20)(retry_delay=3)(address=(protocol=tcps)(port=1521)(host=adb.eu-madrid-1.oraclecloud.com))(connect_data=(service_name=ge32c8a2145bafd_spiritblade_tp.adb.oraclecloud.com))(security=(ssl_server_dn_match=yes)))"
        - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
          value: "oracle.jdbc.OracleDriver"
        - name: SPRING_JPA_DATABASE_PLATFORM
          value: "org.hibernate.dialect.OracleDialect"
        - name: SPRING_DATASOURCE_USERNAME
          value: "ADMIN"
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: spiritblade-secrets
              key: adb-password
        - name: SPRING_DATA_REDIS_HOST
          value: "redis-cluster-master" # Points to Redis Bitnami Master Service
        - name: SPRING_DATA_REDIS_PORT
          value: "6379"
        # OCI Object Storage S3 Compatibility
        - name: MINIO_ENDPOINT
          value: "https://axqwnu0emm0s.compat.objectstorage.eu-madrid-1.oraclecloud.com"
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: spiritblade-secrets
              key: oci-storage-access-key
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: spiritblade-secrets
              key: oci-storage-secret-key
        - name: MINIO_BUCKET_NAME
          value: "spiritblade-bucket"
        - name: RIOT_API_KEY
          valueFrom:
            secretKeyRef:
              name: spiritblade-secrets
              key: riot-api-key
        - name: GOOGLE_AI_API_KEY
          valueFrom:
            secretKeyRef:
              name: spiritblade-secrets
              key: google-ai-api-key
        - name: SERVER_SSL_KEY_STORE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: spiritblade-secrets
              key: ssl-password
        - name: SERVER_SSL_KEY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: spiritblade-secrets
              key: ssl-password
        livenessProbe:
          exec:
            command: ["curl", "-k", "-f", "https://localhost:443/actuator/health"]
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          exec:
            command: ["curl", "-k", "-f", "https://localhost:443/actuator/health"]
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: prod
  labels:
    app: backend
    environment: prod
spec:
  selector:
    app: backend
  ports:
  - port: 443
    targetPort: 443
    protocol: TCP
    name: https
  type: ClusterIP
