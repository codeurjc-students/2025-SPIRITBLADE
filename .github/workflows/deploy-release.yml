name: Deploy Release

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    uses: ./.github/workflows/build-push.yml
    with:
      image-tag: ${{ github.ref_name }}
      compose-tag: ${{ github.ref_name }}
      update-latest: true
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  deploy-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Install OCI CLI
        run: |
          curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh -o install_oci_cli.sh
          bash install_oci_cli.sh --accept-all-defaults
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: 🔐 Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_CLI_KEY_CONTENT }}" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem

          {
            echo '[DEFAULT]'
            echo 'user=${{ secrets.OCI_CLI_USER }}'
            echo 'fingerprint=${{ secrets.OCI_CLI_FINGERPRINT }}'
            echo 'tenancy=${{ secrets.OCI_CLI_TENANCY }}'
            echo 'region=eu-madrid-1'
            echo 'key_file=/home/runner/.oci/key.pem'
          } > ~/.oci/config
          chmod 600 ~/.oci/config

      - name: 🔍 Verify OCI credentials
        env:
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
        run: |
          echo "Testing OCI auth..."
          oci iam user get --user-id ${{ secrets.OCI_CLI_USER }}
          echo "Listing clusters in eu-madrid-1..."
          oci ce cluster list --compartment-id ${{ secrets.OCI_CLI_TENANCY }} --region eu-madrid-1

      - name: ☸️ Configure Kubectl
        env:
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
        run: |
          mkdir -p $HOME/.kube
          oci ce cluster create-kubeconfig \
            --cluster-id ocid1.cluster.oc1.eu-madrid-1.aaaaaaaazox7fgzym7ocb2kbxp7cluzhi6ogio4qfb6mrgjb7cuo24muyroa \
            --file $HOME/.kube/config \
            --region eu-madrid-1 \
            --token-version 2.0.0 \
            --kube-endpoint PUBLIC_ENDPOINT

      - name: 🔄 Restart Deployments (Force Update)
        run: |
          kubectl rollout restart deployment/backend -n prod
          kubectl rollout restart deployment/frontend -n prod
          kubectl rollout status deployment/backend -n prod --timeout=120s
          kubectl rollout status deployment/frontend -n prod --timeout=120s
